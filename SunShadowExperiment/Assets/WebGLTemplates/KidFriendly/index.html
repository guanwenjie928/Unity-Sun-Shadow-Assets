<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>太阳与影子夹角实验</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden;
      background: #1a1a2e; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }

    /* 加载画面 */
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(180deg, #0f0c29, #302b63, #24243e);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
    }

    #loading-screen .sun-icon {
      width: 120px; height: 120px; margin-bottom: 30px;
      background: radial-gradient(circle, #FFD700, #FF8C00);
      border-radius: 50%;
      box-shadow: 0 0 80px rgba(255, 165, 0, 0.6), 0 0 160px rgba(255, 140, 0, 0.3);
      animation: sun-pulse 2s ease-in-out infinite;
    }

    @keyframes sun-pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 80px rgba(255,165,0,0.6); }
      50% { transform: scale(1.1); box-shadow: 0 0 120px rgba(255,140,0,0.8); }
    }

    #loading-screen h1 {
      color: #FFD700; font-size: 36px; margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }

    #loading-screen p {
      color: #aaa; font-size: 18px; margin-bottom: 20px;
    }

    #progress-bar {
      width: 300px; height: 8px; background: rgba(255,255,255,0.1);
      border-radius: 4px; overflow: hidden;
    }

    #progress-bar .fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #FF8C00, #FFD700);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    #loading-screen .percent {
      color: #ccc; font-size: 16px; margin-top: 8px;
    }

    /* 游戏画布 */
    #unity-container { width: 100%; height: 100%; }
    #unity-canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="sun-icon"></div>
    <h1>太阳与影子夹角实验</h1>
    <p>正在加载，请稍候...</p>
    <div id="progress-bar"><div class="fill"></div></div>
    <div class="percent" id="percent-text">0%</div>
  </div>

  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>

  <script>
    // Unity 加载进度回调
    var loadingScreen = document.getElementById('loading-screen');
    var progressFill = document.querySelector('#progress-bar .fill');
    var percentText = document.getElementById('percent-text');

    function unityShowBanner(msg, type) {
      // 不显示 Unity 默认横幅，保持简洁
    }

    function unityProgressCallback(progress) {
      var pct = Math.round(progress * 100);
      progressFill.style.width = pct + '%';
      percentText.textContent = pct + '%';

      if (pct >= 100) {
        setTimeout(function() {
          loadingScreen.style.opacity = '0';
          loadingScreen.style.transition = 'opacity 0.5s ease';
          setTimeout(function() { loadingScreen.style.display = 'none'; }, 500);
        }, 300);
      }
    }
  </script>
</body>
</html>
